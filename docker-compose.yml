version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: bizflow_db
    restart: always
    environment:
      POSTGRES_DB: bizflow_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  cache:
    image: redis:7-alpine
    container_name: bizflow_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  adminer:
    image: adminer:latest
    container_name: bizflow_adminer
    restart: always
    ports:
      - "8080:8080"
    depends_on:
      - db

volumes:
  pgdata:
  redisdata:
